kind = "web"
previewPath = "/"
title = "TKDL – Tesco Kitchen Darts League"
version = "1.0.0"
id = "artifacts/tkdl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24456

[services.development]
run = "pnpm --filter @workspace/tkdl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tkdl", "run", "build" ]
publicDir = "artifacts/tkdl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24456"
BASE_PATH = "/"
