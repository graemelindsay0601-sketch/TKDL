kind = "api"
previewPath = "/dart-scorer"
title = "Dart Auto-Scorer"
version = "1.0.0"
id = "dart-scorer-python"

[[services]]
localPort = 8090
name = "Dart Auto-Scorer"
paths = ["/dart-scorer"]

[services.development]
run = "cd artifacts/dart-scorer && python3 -m uvicorn main:app --host 0.0.0.0 --port 8090 --reload"
