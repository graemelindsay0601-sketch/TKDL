<!-- Prevent email detection -->

<!-- PERFORMANCE OPTIMIZATIONS -->
<!-- Preconnect to API if different domain -->
<!-- <link rel="preconnect" href="https://api.example.com" /> -->

<!-- DNS prefetch for faster external resources -->
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

<!-- SECURITY HEADERS (if inline) -->
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta http-equiv="x-ua-compatible" content="ie=edge" />

<!-- CACHE CONTROL (set via server headers preferably) -->
<!-- <meta http-equiv="Cache-Control" content="max-age=31536000" /> -->

<!-- PRELOAD CRITICAL RESOURCES -->
<link rel="preload" as="style" href="/styles/responsive.css" />

<!-- STYLES -->
<link rel="stylesheet" href="/styles/responsive.css" />

<!-- DARK MODE SUPPORT -->
<meta name="color-scheme" content="dark" />
<style>
  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
    }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
    }
  }
</style>

<!-- PREVENT ZOOM ON LANDSCAPE (optional, can improve UX on mobile) -->
<script>
  // Prevent double-tap zoom on devices that support it
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);
</script>

<!-- PWA DETECTION & INSTALLATION PROMPTS -->
<script>
  // Detect if app is installed
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Show install button here if desired
  });

  window.addEventListener('appinstalled', () => {
    console.log('TKDL app installed');
    // Analytics or confirmation
  });

  // Handle standalone mode (app opened as installed app)
  window.addEventListener('load', () => {
    if (window.navigator.standalone === true) {
      document.body.classList.add('pwa-standalone');
    }
  });
</script>

<!-- REGISTER SERVICE WORKER FOR OFFLINE SUPPORT -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(err => {
      console.error('Service Worker registration failed:', err);
    });
  }
</script>

<!-- ORIENTATION CHANGE HANDLING -->
<script>
  // Handle orientation changes for tablets
  window.addEventListener('orientationchange', () => {
    // Redraw layouts that depend on orientation
    setTimeout(() => {
      window.dispatchEvent(new Event('resize'));
    }, 100);
  });

  // Lock orientation on portrait if needed (iOS 16.4+)
  if (screen.orientation && screen.orientation.lock) {
    // Only on mobile devices, not tablets
    const isMobile = window.innerWidth < 600;
    if (isMobile) {
      screen.orientation.lock('portrait-primary').catch(err => {
        console.log('Cannot lock orientation:', err);
      });
    }
  }
</script>
