services:
  - type: web
    name: tkdl
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DART_SCORER_DIR
        value: /app/artifacts/dart-scorer
