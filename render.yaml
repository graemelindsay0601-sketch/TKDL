services:
  - type: web
    name: tkdl
    runtime: node
    region: oregon
    buildCommand: pip3 install --quiet ultralytics opencv-python-headless Pillow numpy && pnpm install && pnpm --filter @workspace/tkdl run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
