openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: TKDL – Tesco Kilbirnie Darts League API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: players
  - name: matches
  - name: seasons
  - name: leaderboard
  - name: achievements
  - name: stats
  - name: team-matches
  - name: storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Players ────────────────────────────────────────────────────────────────
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Register a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "400":
          description: Validation error

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /players/{id}/stats:
    get:
      operationId: getPlayerStats
      tags: [players]
      summary: Get full career + current season stats for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStats"
        "404":
          description: Not found

  /players/{id}/achievements:
    get:
      operationId: getPlayerAchievements
      tags: [achievements]
      summary: Get achievements unlocked by a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerAchievement"

  # ── Matches ─────────────────────────────────────────────────────────────────
  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches (optionally filtered by season)
      parameters:
        - name: seasonId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: submitMatch
      tags: [matches]
      summary: Submit a match result with wager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Match recorded, standings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "400":
          description: Validation error

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a match by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "404":
          description: Not found
    delete:
      operationId: deleteMatch
      tags: [matches]
      summary: Delete / void a match result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Seasons ─────────────────────────────────────────────────────────────────
  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List all historical seasons
      responses:
        "200":
          description: Season history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"

  /seasons/current:
    get:
      operationId: getCurrentSeason
      tags: [seasons]
      summary: Get the current active season
      responses:
        "200":
          description: Current season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  /seasons/{id}:
    get:
      operationId: getSeason
      tags: [seasons]
      summary: Get a specific historical season with standings snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season with final standings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonDetail"
        "404":
          description: Not found

  /seasons/reset:
    post:
      operationId: resetSeason
      tags: [seasons]
      summary: Close current season and open a new one
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonResetInput"
      responses:
        "201":
          description: New season started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  # ── Leaderboard ─────────────────────────────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Current season live leaderboard (points-based)
      responses:
        "200":
          description: Ranked leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── Achievements ─────────────────────────────────────────────────────────────
  /achievements:
    get:
      operationId: listAchievements
      tags: [achievements]
      summary: List all achievement definitions
      responses:
        "200":
          description: Achievement catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  # ── Stats ────────────────────────────────────────────────────────────────────
  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Dashboard summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/career-leaders:
    get:
      operationId: getCareerLeaders
      tags: [stats]
      summary: Top players ranked by career wins, win rate, and Elo
      responses:
        "200":
          description: Career leaders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerLeader"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent match activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /stats/narrative:
    get:
      operationId: getNarrativeCards
      tags: [stats]
      summary: Narrative storyline cards for the dashboard
      responses:
        "200":
          description: Narrative cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NarrativeCard"

  # ── Team Matches ─────────────────────────────────────────────────────────────
  /team-matches:
    get:
      operationId: listTeamMatches
      tags: [team-matches]
      summary: List recent team matches
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of team matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMatchResult"
    post:
      operationId: submitTeamMatch
      tags: [team-matches]
      summary: Submit a team match result (doubles / triples)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTeamMatchInput"
      responses:
        "201":
          description: Team match recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMatchResult"
        "400":
          description: Validation error

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Player ─────────────────────────────────────────────────────────────────
    Player:
      type: object
      required: [id, playerId, name, status, elo, points, seasonWins, seasonLosses, careerWins, careerLosses, careerGamesPlayed, isActive, createdAt]
      properties:
        id:
          type: integer
        playerId:
          type: string
        name:
          type: string
        status:
          type: string
          description: "ACTIVE | ELIMINATED | INACTIVE"
        elo:
          type: integer
        points:
          type: integer
          description: Current season point balance
        peakPoints:
          type: integer
        seasonWins:
          type: integer
        seasonLosses:
          type: integer
        seasonGamesPlayed:
          type: integer
        careerWins:
          type: integer
        careerLosses:
          type: integer
        careerGamesPlayed:
          type: integer
        careerPoints:
          type: integer
        careerPeakElo:
          type: integer
        currentWinStreak:
          type: integer
        longestWinStreak:
          type: integer
        currentLossStreak:
          type: integer
        eliminationsCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PlayerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        playerId:
          type: string

    PlayerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        isActive:
          type: boolean
        status:
          type: string

    PlayerStats:
      type: object
      required: [player, seasonHistory]
      properties:
        player:
          $ref: "#/components/schemas/Player"
        seasonHistory:
          type: array
          items:
            $ref: "#/components/schemas/SeasonRecord"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/PlayerAchievement"
        headToHead:
          type: array
          items:
            $ref: "#/components/schemas/HeadToHead"
        identity:
          $ref: "#/components/schemas/PlayerIdentity"

    HeadToHead:
      type: object
      required: [opponentId, opponentName, wins, losses, matches]
      properties:
        opponentId:
          type: integer
        opponentName:
          type: string
        wins:
          type: integer
        losses:
          type: integer
        matches:
          type: array
          items:
            $ref: "#/components/schemas/H2HMatch"

    H2HMatch:
      type: object
      required: [id, playedAt, isWin, eloChange, stake, gameType]
      properties:
        id:
          type: integer
        playedAt:
          type: string
          format: date-time
        isWin:
          type: boolean
        eloChange:
          type: integer
        stake:
          type: integer
        gameType:
          type: string

    PlayerIdentity:
      type: object
      required: [archetype, archetypeLabel, archetypeIcon, aura, auraLabel, auraColor, title]
      properties:
        archetype:
          type: string
        archetypeLabel:
          type: string
        archetypeIcon:
          type: string
        aura:
          type: string
        auraLabel:
          type: string
        auraColor:
          type: string
        title:
          type: string

    SeasonRecord:
      type: object
      required: [seasonId, seasonName, position, wins, losses, points]
      properties:
        seasonId:
          type: integer
        seasonName:
          type: string
        position:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        points:
          type: integer
        elo:
          type: integer
        isChampion:
          type: boolean

    # ── Match ──────────────────────────────────────────────────────────────────
    Match:
      type: object
      required: [id, seasonId, winnerId, loserId, winnerName, loserName, stake, eloChange, playedAt]
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        winnerId:
          type: integer
        loserId:
          type: integer
        winnerName:
          type: string
        loserName:
          type: string
        stake:
          type: integer
          description: Points wagered on this match
        eloChange:
          type: integer
        gameType:
          type: string
        isTeamMatch:
          type: boolean
        notes:
          type: ["string", "null"]
        playedAt:
          type: string
          format: date-time
        winnerDarts:
          type: integer
        winner180s:
          type: integer
        winnerCheckoutAttempts:
          type: integer
        winnerCheckoutHits:
          type: integer
        loserDarts:
          type: integer
        loser180s:
          type: integer
        loserCheckoutAttempts:
          type: integer
        loserCheckoutHits:
          type: integer

    MatchInput:
      type: object
      required: [winnerId, loserId, stake]
      properties:
        winnerId:
          type: integer
        loserId:
          type: integer
        stake:
          type: integer
          minimum: 0
          description: Points wagered (max = min of both balances)
        gameType:
          type: string
        notes:
          type: string
        winnerDarts:
          type: integer
        winner180s:
          type: integer
        winnerCheckoutAttempts:
          type: integer
        winnerCheckoutHits:
          type: integer
        loserDarts:
          type: integer
        loser180s:
          type: integer
        loserCheckoutAttempts:
          type: integer
        loserCheckoutHits:
          type: integer

    # ── Season ─────────────────────────────────────────────────────────────────
    Season:
      type: object
      required: [id, name, startDate, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: ["string", "null"]
          format: date
        isActive:
          type: boolean
        championId:
          type: ["integer", "null"]
        championName:
          type: ["string", "null"]
        totalMatches:
          type: integer

    SeasonDetail:
      type: object
      required: [season, standings]
      properties:
        season:
          $ref: "#/components/schemas/Season"
        standings:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"

    SeasonResetInput:
      type: object
      properties:
        name:
          type: string

    # ── Leaderboard ─────────────────────────────────────────────────────────────
    LeaderboardEntry:
      type: object
      required: [position, positionChange, playerId, playerName, wins, losses, gamesPlayed, points, elo, tier, status]
      properties:
        position:
          type: integer
        positionChange:
          type: integer
        playerId:
          type: integer
        playerName:
          type: string
        wins:
          type: integer
        losses:
          type: integer
        gamesPlayed:
          type: integer
        points:
          type: integer
        peakPoints:
          type: integer
        elo:
          type: integer
        tier:
          type: string
        winRate:
          type: number
        currentStreak:
          type: integer
        status:
          type: string
        archetype:
          type: string
        archetypeIcon:
          type: string
        aura:
          type: string
        auraColor:
          type: string
        title:
          type: string

    # ── Achievements ─────────────────────────────────────────────────────────────
    Achievement:
      type: object
      required: [id, key, name, description, icon, rarity, category, hidden, priority, criteriaType, criteriaValue]
      properties:
        id:
          type: integer
        key:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        rarity:
          type: string
          description: "Common / Rare / Epic / Legendary / Mythic"
        category:
          type: string
          description: "Career / Seasonal / Tier / Hidden / Rank"
        hidden:
          type: boolean
        priority:
          type: integer
        criteriaType:
          type: string
        criteriaValue:
          type: integer
        engineType:
          type: string
        secondaryCriteria:
          type: ["string", "null"]
        secondaryValue:
          type: ["integer", "null"]

    PlayerAchievement:
      type: object
      required: [achievement, unlockedAt]
      properties:
        achievement:
          $ref: "#/components/schemas/Achievement"
        unlockedAt:
          type: string
          format: date-time

    # ── Stats ────────────────────────────────────────────────────────────────────
    StatsSummary:
      type: object
      required: [totalPlayers, totalMatches, currentSeasonMatches, currentSeasonName]
      properties:
        totalPlayers:
          type: integer
        activePlayers:
          type: integer
        totalMatches:
          type: integer
        currentSeasonMatches:
          type: integer
        currentSeasonName:
          type: string
        currentLeader:
          $ref: "#/components/schemas/LeaderboardEntry"
        topEloPlayer:
          $ref: "#/components/schemas/Player"
        lastMatch:
          $ref: "#/components/schemas/Match"
        seasonsCompleted:
          type: integer
        eliminatedCount:
          type: integer

    CareerLeader:
      type: object
      required: [player, careerWins, careerWinRate, elo, seasonTitles]
      properties:
        player:
          $ref: "#/components/schemas/Player"
        careerWins:
          type: integer
        careerWinRate:
          type: number
        elo:
          type: integer
        seasonTitles:
          type: integer

    ActivityItem:
      type: object
      required: [matchId, winnerName, loserName, stake, eloChange, playedAt]
      properties:
        matchId:
          type: integer
        winnerId:
          type: integer
        loserId:
          type: integer
        winnerName:
          type: string
        loserName:
          type: string
        stake:
          type: integer
        eloChange:
          type: integer
        gameType:
          type: string
        isTeamMatch:
          type: boolean
        playedAt:
          type: string
          format: date-time
        seasonId:
          type: integer

    NarrativeCard:
      type: object
      required: [type, headline, body, priority, playerIds, icon]
      properties:
        type:
          type: string
        headline:
          type: string
        body:
          type: string
        priority:
          type: integer
        playerIds:
          type: array
          items:
            type: integer
        icon:
          type: string

    SubmitTeamMatchInput:
      type: object
      required: [winnerIds, loserIds, stakePerPerson]
      properties:
        winnerIds:
          type: array
          items:
            type: integer
        loserIds:
          type: array
          items:
            type: integer
        stakePerPerson:
          type: integer
        gameType:
          type: string
        notes:
          type: string

    TeamMatchParticipant:
      type: object
      required: [id, teamMatchId, playerId, playerName, team, eloChange, pointsChange]
      properties:
        id:
          type: integer
        teamMatchId:
          type: integer
        playerId:
          type: integer
        playerName:
          type: string
        team:
          type: integer
        eloChange:
          type: integer
        pointsChange:
          type: integer

    TeamMatchResult:
      type: object
      required: [id, seasonId, gameType, stakePerPerson, teamSize, playedAt, participants]
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        gameType:
          type: string
        stakePerPerson:
          type: integer
        teamSize:
          type: integer
        playedAt:
          type: string
          format: date-time
        participants:
          type: array
          items:
            $ref: "#/components/schemas/TeamMatchParticipant"

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
